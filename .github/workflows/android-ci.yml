name: Android CI

on:
  push:
    branches: [ main, master, 'feature/**', 'testing/**' ]
  pull_request:
    branches: [ main, master, 'feature/**' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}
          gradle-home-cache-cleanup: true
          # Best practice: Enable dependency graph for Dependabot security updates
          dependency-graph: generate

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --build-cache

      - name: Run Lint
        run: ./gradlew lintDebug

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ github.sha }}
          path: |
            app/build/reports/tests/
            app/build/test-results/
          retention-days: 14

      - name: Run ktlint (if configured)
        run: ./gradlew ktlintCheck || true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload Lint Report
        uses: actions/upload-artifact@v7
        with:
          name: lint-report-${{ github.sha }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 14
